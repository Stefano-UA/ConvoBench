name: Deploy Pages
run-name: Page deployment by ${{ github.actor }}
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  pages: write
  contents: read
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 'main'
          submodules: 'recursive'
      - name: Copy folders to dist
        run: |
          mkdir -p ./web/dist
          cp -r ./input ./output ./web/dist/
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/dist'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4